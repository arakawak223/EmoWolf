name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build shared
        run: npm run build -w shared

      - name: Run tests
        run: npm test

      - name: Build client
        run: npm run build -w client
        env:
          NEXT_PUBLIC_SERVER_URL: https://placeholder.example.com
